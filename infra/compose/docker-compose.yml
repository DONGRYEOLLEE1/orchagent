services:
  db:
    image: postgres:15-alpine
    container_name: orchagent-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orchagent
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../
      dockerfile: infra/docker/backend.Dockerfile
    container_name: orchagent-backend
    env_file:
      - ../../apps/backend/.env
    ports:
      - "8000:8000"
    environment:
      POSTGRES_SERVER: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orchagent
      PYTHONUNBUFFERED: "1"
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--log-level", "debug"]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../../
      dockerfile: infra/docker/frontend.Dockerfile
    container_name: orchagent-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
