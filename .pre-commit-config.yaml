# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # Astral Ruff: Lightning-fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.5
    hooks:
      # Run the linter and try to auto-fix issues.
      - id: ruff
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format

  # Custom local hooks for tools without official remote hooks yet
  - repo: local
    hooks:
      # Astral ty: Lightning-fast Python type checker (Beta)
      - id: ty-check
        name: ty type checker
        entry: uvx ty check
        language: system
        types: [python]
        pass_filenames: true

      # Next.js ESLint
      - id: frontend-lint
        name: frontend eslint
        entry: bash -c "cd apps/frontend && npm run lint"
        language: system
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: false
