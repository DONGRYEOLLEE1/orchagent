name: OrchAgent CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Pytest
        run: |
          cd apps/backend
          PYTHONPATH=. uv run pytest tests/
        env:
          TAVILY_API_KEY: mock-key
          OPENAI_API_KEY: mock-key

  frontend-build:
    name: Frontend Build (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/frontend
          npm ci

      - name: Run Linter
        run: |
          cd apps/frontend
          npm run lint

      - name: Build Next.js
        run: |
          cd apps/frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
